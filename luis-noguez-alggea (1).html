<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luis Noguez — ALGGEA</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cyan:   #8CCFDD;
    --blue:   #0C76BA;
    --purple: #56578E;
    --darker: #0a0c10;
    --card:   #161a20;
    --text:   #e8edf2;
    --muted:  #6a7a88;
    --border: rgba(140,207,221,0.13);
  }
  html, body {
    min-height: 100vh;
    background: var(--darker);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    padding: 20px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(12,118,186,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(12,118,186,0.04) 1px, transparent 1px);
    background-size: 38px 38px;
    pointer-events: none; z-index: 0;
  }
  .card {
    position: relative; width: 100%; max-width: 400px;
    background: var(--card);
    border-radius: 20px; border: 1px solid var(--border);
    overflow: hidden; z-index: 1;
  }
  .card::before, .card::after {
    content: ''; position: absolute; width: 18px; height: 18px; z-index: 10;
  }
  .card::before { top:10px; left:10px; border-top:1.5px solid var(--cyan); border-left:1.5px solid var(--cyan); border-radius:3px 0 0 0; }
  .card::after  { bottom:10px; right:10px; border-bottom:1.5px solid var(--cyan); border-right:1.5px solid var(--cyan); border-radius:0 0 3px 0; }

  .card-header {
    padding: 32px 28px 24px;
    background: #12161e;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .card-header::before {
    content: ''; position: absolute; top:0; right:0;
    width: 130px; height: 130px;
    background-image:
      linear-gradient(rgba(140,207,221,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140,207,221,0.07) 1px, transparent 1px);
    background-size: 18px 18px; border-radius: 0 20px 0 0;
  }
  .logo-img {
    width: 150px; object-fit: contain;
    position: relative; z-index: 2;
    filter: drop-shadow(0 0 16px rgba(12,118,186,0.4));
  }

  .divider { display:flex; align-items:center; gap:8px; padding:0 28px; }
  .divider-line { flex:1; height:1px; background:var(--border); }
  .divider-dot  { width:5px; height:5px; border-radius:50%; background:var(--blue); flex-shrink:0; }

  .person { padding:22px 28px 16px; text-align:center; }
  .person-name {
    font-size: 22px; font-weight: 700;
    letter-spacing: 2px; color: var(--text);
    text-transform: uppercase; margin-bottom: 8px;
  }
  .person-role {
    font-size: 11px; font-weight: 300;
    letter-spacing: 2px; color: var(--cyan);
    text-transform: uppercase; line-height: 1.7;
  }

  .contacts { padding: 0 20px 20px; display:flex; flex-direction:column; }
  .c-item {
    display:flex; align-items:center; gap:13px;
    padding:11px 10px; border-radius:8px;
    text-decoration:none; transition: background 0.15s;
    border-bottom: 1px solid rgba(140,207,221,0.06);
  }
  .c-item:last-child { border-bottom: none; }
  .c-item:hover { background: rgba(12,118,186,0.09); }
  .c-icon {
    width:34px; height:34px; border-radius:50%;
    border:1px solid rgba(140,207,221,0.18);
    background:rgba(140,207,221,0.05);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .c-icon svg { width:15px; height:15px; }
  .c-label { font-size:9px; font-weight:300; letter-spacing:2px; color:var(--muted); text-transform:uppercase; display:block; margin-bottom:2px; }
  .c-value  { font-size:13px; font-weight:400; color:var(--text); }
  .c-item.whatsapp .c-icon { border-color: rgba(37,211,102,0.3); background: rgba(37,211,102,0.05); }

  .qr-row {
    margin:0 20px 20px; padding:16px 18px;
    border:1px solid var(--border); border-radius:12px;
    background:rgba(140,207,221,0.03);
    display:flex; align-items:center; gap:16px;
  }
  .qr-box {
    width:80px; height:80px; background:#fff; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; padding: 4px;
  }
  .qr-box svg { width:72px; height:72px; }
  .qr-eyebrow { font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; font-weight:300; display:block; margin-bottom:4px; }
  .qr-desc    { font-size:12px; color:var(--cyan); font-weight:300; line-height:1.5; }

  .cta { padding: 0 20px 20px; }
  .btn-save {
    display:block; width:100%; padding:13px 20px;
    background: linear-gradient(120deg, var(--blue) 0%, var(--purple) 100%);
    color:#fff; font-size:13px; font-weight:700; letter-spacing:4px;
    text-transform:uppercase; text-align:center;
    border:none; border-radius:10px; cursor:pointer;
    text-decoration:none; transition:opacity 0.2s, transform 0.1s;
  }
  .btn-save:hover  { opacity:0.88; }
  .btn-save:active { transform:scale(0.98); }

  .nfc {
    display:flex; align-items:center; justify-content:center; gap:7px;
    padding:0 20px 22px;
    font-size:9px; letter-spacing:2.5px; color:var(--muted);
    text-transform:uppercase; font-weight:300;
  }
  .nfc-dot { width:5px; height:5px; border-radius:50%; background:var(--cyan); animation:pulse 2.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.35;transform:scale(0.65);} }
</style>
</head>
