<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGGEA — Tarjetas Digitales</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cyan:   #8CCFDD;
    --blue:   #0C76BA;
    --purple: #56578E;
    --darker: #0a0c10;
    --card:   #161a20;
    --text:   #e8edf2;
    --muted:  #6a7a88;
    --border: rgba(140,207,221,0.13);
  }
  html, body {
    min-height: 100vh;
    background: var(--darker);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    padding: 40px 20px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(12,118,186,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(12,118,186,0.04) 1px, transparent 1px);
    background-size: 38px 38px;
    pointer-events: none; z-index: 0;
  }
  .wrapper {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column; align-items: center; gap: 32px;
  }
  .logo-area {
    text-align: center;
  }
  .logo-area h1 {
    font-size: 2rem; font-weight: 700; letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--cyan), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-area p {
    color: var(--muted); font-size: 0.85rem; margin-top: 6px; letter-spacing: 0.05em;
  }
  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--blue));
    border-radius: 2px;
  }
  .cards-list {
    width: 100%; display: flex; flex-direction: column; gap: 14px;
  }
  .card-link {
    display: flex; align-items: center; gap: 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .card-link::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(140,207,221,0.04), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .card-link:hover {
    border-color: rgba(140,207,221,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(12,118,186,0.15);
  }
  .card-link:hover::before { opacity: 1; }
  .avatar {
    width: 46px; height: 46px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 700; color: #fff; flex-shrink: 0;
    letter-spacing: 0.02em;
  }
  .info { flex: 1; }
  .info .name { font-size: 1rem; font-weight: 600; color: var(--text); }
  .info .role { font-size: 0.78rem; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .arrow {
    color: var(--cyan); font-size: 1.1rem; opacity: 0.6;
    transition: opacity 0.2s, transform 0.2s;
  }
  .card-link:hover .arrow { opacity: 1; transform: translateX(3px); }
  .footer {
    color: var(--muted); font-size: 0.75rem; text-align: center; letter-spacing: 0.04em;
  }
  .footer a { color: var(--cyan); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="logo-area">
    <h1>ALGGEA</h1>
    <p>Tarjetas de contacto digitales</p>
  </div>

  <div class="divider"></div>

  <div class="cards-list">

    <a class="card-link" href="gabriel-barron-alggea.html">
      <div class="avatar">GB</div>
      <div class="info">
        <div class="name">Gabriel Barron</div>
        <div class="role">Innovación y Soluciones Tecnológicas</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="card-link" href="ana-narvaez-alggea.html">
      <div class="avatar">AN</div>
      <div class="info">
        <div class="name">Ana Narvaez</div>
        <div class="role">Estrategia Comercial y Desarrollo de Negocio</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="card-link" href="luis-noguez-alggea.html">
      <div class="avatar">LN</div>
      <div class="info">
        <div class="name">Luis Noguez</div>
        <div class="role">Operación Administrativa y Gestión Tecnológica</div>
      </div>
      <span class="arrow">→</span>
    </a>

  </div>

  <div class="footer">
    <a href="https://www.alggea.com" target="_blank">www.alggea.com</a>
  </div>

</div>
</body>
</html>
